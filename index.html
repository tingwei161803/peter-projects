<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ==== Primary meta ==== -->
  <title>Peter's Projects · 近期專案精選</title>
  <meta name="description" content="Peter 近一個月公開上線、附 GitHub Pages 的專案，依科技活動、AI 產業趨勢、創業商業、AI 技術應用四大主題分類整理。" />
  <link rel="canonical" href="https://tingwei161803.github.io/side-projects/" />
  <meta name="theme-color" content="#4F46E5" />

  <!-- ==== Open Graph ==== -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Peter's Projects · 近期專案精選" />
  <meta property="og:description" content="近一個月公開上線、附 GitHub Pages 的專案，依主題分類整理。" />
  <meta property="og:url" content="https://tingwei161803.github.io/side-projects/" />

  <!-- ==== Twitter ==== -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Peter's Projects · 近期專案精選" />
  <meta name="twitter:description" content="近一個月公開上線、附 GitHub Pages 的專案，依主題分類整理。" />

  <!-- ==== JSON-LD structured data ==== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "Peter's Projects",
    "description": "近一個月公開上線、附 GitHub Pages 的專案，依主題分類整理。",
    "url": "https://tingwei161803.github.io/side-projects/"
  }
  </script>

  <!-- ==== Fonts + icons (CDN, no local files) ==== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400..700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <!-- ==== App bar ==== -->
  <header class="appbar">
    <div class="appbar__inner">
      <a class="brand" href="#top">
        <span class="material-symbols-rounded brand__logo">workspaces</span>
        <span class="brand__name" id="brandName">Peter's Projects</span>
      </a>

      <div class="appbar__actions">
        <a class="icon-btn icon-btn--ghost" id="ghLink" href="https://github.com/tingwei161803"
           target="_blank" rel="noopener" title="GitHub" aria-label="GitHub">
          <span class="material-symbols-rounded">code</span>
          <span class="icon-btn__txt">GitHub</span>
        </a>

        <button class="icon-btn" id="langToggle" type="button"
                title="Language" aria-label="Toggle language / 切換語言">
          <span class="material-symbols-rounded">translate</span>
          <span class="icon-btn__txt" id="langLabel">中</span>
        </button>

        <button class="icon-btn" id="themeToggle" type="button"
                title="Theme" aria-label="Toggle theme / 切換主題">
          <span class="material-symbols-rounded" id="themeIcon">dark_mode</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ==== Sticky section nav (auto-generated anchor pills + scrollspy) ==== -->
  <nav class="sectionnav" id="sectionNav" aria-label="Section navigation">
    <div class="sectionnav__inner" id="sectionNavInner"></div>
  </nav>

  <span id="top"></span>

  <!-- ==== Composite sections (rendered in order, built from data/projects.js) ==== -->
  <main id="sections" aria-live="polite"></main>

  <!-- ==== Footer ==== -->
  <footer class="footer">
    <p id="footerText">使用 lazy-data2web 建置 · 純靜態，無建置流程。</p>
  </footer>

  <!-- ==== Scripts (order matters: data first) ==== -->
  <script src="data/projects.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
